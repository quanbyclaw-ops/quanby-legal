server {
    server_name legal.quanbyai.com;

    root /var/www/quanby-legal;
    index index.html;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Pass Set-Cookie headers from redirects (needed for OAuth cookie setting)
        proxy_pass_header Set-Cookie;
        proxy_cookie_path /api/auth/refresh /api/auth/refresh;
    }

    location = /browse       { try_files /browse.html /index.html; }
    location = /appointments { try_files /appointments.html /index.html; }
    location = /dashboard    { try_files /dashboard.html /index.html; }
    location = /onboard      { try_files /onboard.html /index.html; }
    location = /session      { try_files /session.html /index.html; }
    location = /registry     { try_files /registry.html /index.html; }
    location = /profile      { try_files /profile.html /index.html; }
    location = /management/sub-orgs { try_files /suborgs.html /index.html; }
    location = /lobby {
        try_files /lobby.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # No-cache for all HTML pages — prevents stale session/auth state after navigation
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/legal.quanbyai.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/legal.quanbyai.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = legal.quanbyai.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name legal.quanbyai.com;
    return 404; # managed by Certbot


}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Dashboard — Quanby Legal</title>
<link rel="icon" href="/favicon.ico"/>
<style>
  :root {
    --navy:#1B2A6B; --gold:#C9A84C; --teal:#0EA5E9; --bg:#0D0F1A;
    --surface:#141726; --border:rgba(255,255,255,0.08);
    --text:#E8EAF2; --muted:#8B90A8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* NAV */
  nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(13,15,26,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
  .nav-logo{display:flex;align-items:center;gap:0.5rem;font-weight:700;font-size:1.1rem;color:var(--gold);text-decoration:none;}
  .nav-logo span{color:var(--text);}
  .nav-actions{display:flex;align-items:center;gap:1rem;}
  .nav-actions a{color:var(--muted);text-decoration:none;font-size:0.875rem;}
  .nav-actions a:hover{color:var(--text);}
  .btn-signout{background:none;border:1px solid var(--border);color:var(--muted);padding:0.4rem 0.875rem;border-radius:0.375rem;cursor:pointer;font-size:0.875rem;}
  .btn-signout:hover{border-color:var(--gold);color:var(--gold);}

  /* MAIN */
  .container{max-width:860px;margin:0 auto;padding:2rem 1.5rem;}

  /* HERO CARD */
  .hero-card{background:linear-gradient(135deg,rgba(27,42,107,0.6),rgba(14,165,233,0.12));border:1px solid rgba(201,168,76,0.3);border-radius:1rem;padding:2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem;}
  .hero-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--teal));display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;color:#fff;flex-shrink:0;border:2px solid var(--gold);}
  .hero-info h1{font-size:1.5rem;font-weight:700;margin-bottom:0.25rem;}
  .hero-info .role-badge{display:inline-block;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);color:var(--gold);font-size:0.75rem;font-weight:600;padding:0.2rem 0.6rem;border-radius:99px;letter-spacing:0.04em;text-transform:uppercase;}
  .hero-info .email{color:var(--muted);font-size:0.875rem;margin-top:0.25rem;}

  /* STATUS BADGE */
  .status-chip{display:inline-flex;align-items:center;gap:0.4rem;padding:0.35rem 0.85rem;border-radius:99px;font-size:0.8rem;font-weight:600;margin-top:0.5rem;}
  .status-chip.probationary{background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.4);color:#F59E0B;}
  .status-chip.certified{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);color:#10B981;}
  .status-chip.pending{background:rgba(139,144,168,0.15);border:1px solid rgba(139,144,168,0.3);color:var(--muted);}

  /* CARDS GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1.5rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:0.75rem;padding:1.5rem;}
  .card h3{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;}
  .card-value{font-size:1.4rem;font-weight:700;color:var(--text);}
  .card-sub{font-size:0.8rem;color:var(--muted);margin-top:0.25rem;}

  /* CERT BOX */
  .cert-box{background:var(--surface);border:1px solid rgba(201,168,76,0.3);border-radius:0.75rem;padding:1.5rem;margin-bottom:1.5rem;}
  .cert-box h3{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:1rem;}
  .cert-id-block{font-family:monospace;font-size:0.9rem;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:0.5rem;padding:0.75rem 1rem;color:var(--gold);margin-bottom:1rem;word-break:break-all;}
  .btn-gold{display:inline-block;background:linear-gradient(135deg,#C9A84C,#E8C96A);color:#0D0F1A;font-weight:700;padding:0.75rem 1.5rem;border-radius:0.5rem;text-decoration:none;font-size:0.95rem;border:none;cursor:pointer;transition:opacity 0.15s;}
  .btn-gold:hover{opacity:0.88;}
  .btn-outline{display:inline-block;background:none;border:1px solid var(--border);color:var(--text);font-weight:600;padding:0.6rem 1.25rem;border-radius:0.5rem;text-decoration:none;font-size:0.875rem;cursor:pointer;transition:border-color 0.15s;}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
  .btn-teal{display:inline-block;background:var(--teal);color:#fff;font-weight:700;padding:0.75rem 1.5rem;border-radius:0.5rem;text-decoration:none;font-size:0.95rem;border:none;cursor:pointer;}

  /* ACTIONS */
  .actions{display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;}

  /* LOADING / ERROR */
  .loading{text-align:center;padding:4rem;color:var(--muted);}
  .error-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:0.75rem;padding:1.5rem;text-align:center;color:#F87171;}

  .divider{height:1px;background:var(--border);margin:1.5rem 0;}

  @media(max-width:560px){
    .hero-card{flex-direction:column;text-align:center;}
    .actions{flex-direction:column;}
    .btn-gold,.btn-teal,.btn-outline{text-align:center;}
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><span>⚖️ Quanby</span> Legal</a>
  <div class="nav-actions">
    <a href="/">Home</a>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div id="loading" class="loading">Loading your dashboard…</div>
  <div id="error" style="display:none;" class="error-box">
    <p id="error-msg">Unable to load your profile. Please <a href="/" style="color:var(--gold);">sign in</a> first.</p>
  </div>
  <div id="dashboard" style="display:none;">

    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-avatar" id="avatar-initials">?</div>
      <div class="hero-info">
        <h1 id="user-name">…</h1>
        <span class="role-badge" id="user-role">…</span>
        <div class="email" id="user-email">…</div>
        <span class="status-chip" id="status-chip">…</span>
      </div>
    </div>

    <!-- CERT BOX -->
    <div class="cert-box" id="cert-section" style="display:none;">
      <h3>🏅 Your Certificate</h3>
      <div class="cert-id-block" id="cert-id-display">…</div>
      <div style="display:flex;flex-wrap:wrap;gap:0.75rem;">
        <a id="cert-download-btn" href="#" target="_blank" class="btn-gold">⬇️ Download Certificate</a>
        <button class="btn-outline" onclick="copyCertId()">📋 Copy Certificate ID</button>
      </div>
    </div>

    <!-- STATS GRID -->
    <div class="grid">
      <div class="card">
        <h3>Onboarding Status</h3>
        <div class="card-value" id="stat-step">…</div>
        <div class="card-sub" id="stat-step-sub">…</div>
      </div>
      <div class="card">
        <h3>Account Role</h3>
        <div class="card-value" id="stat-role">…</div>
        <div class="card-sub">Platform access level</div>
      </div>
      <div class="card">
        <h3>Certification</h3>
        <div class="card-value" id="stat-cert">…</div>
        <div class="card-sub" id="stat-cert-sub">…</div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="cert-box">
      <h3>⚡ Quick Actions</h3>
      <div class="actions" style="margin-bottom:0;">
        <a href="/" class="btn-outline">🏠 Return to Home</a>
        <a href="https://efiling.sc.judiciary.gov.ph" target="_blank" class="btn-outline">⚖️ Supreme Court Portal</a>
        <button class="btn-outline" id="btn-regenerate" onclick="regenerateCert()" style="display:none;">🔄 Regenerate Certificate</button>
      </div>
    </div>

  </div>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) throw new Error('Not authenticated');
    const user = await res.json();

    // Avatar — use SSO picture if available, else initials
    const name = ((user.first_name || '') + ' ' + (user.last_name || '')).trim() || user.email || '?';
    const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const avatarEl = document.getElementById('avatar-initials');
    if (user.picture) {
      avatarEl.innerHTML = '<img src="' + user.picture + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.textContent='' + initials + ''" />';
      avatarEl.style.background = 'none';
      avatarEl.style.border = '2px solid var(--gold)';
      avatarEl.style.padding = '0';
    } else {
      avatarEl.textContent = initials;
    }

    // Name / role / email
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-email').textContent = user.email || '';
    const roleLabel = { attorney: 'Attorney / ENP', client: 'Client / Principal', admin: 'Administrator' }[user.role] || user.role || 'User';
    document.getElementById('user-role').textContent = roleLabel;
    document.getElementById('stat-role').textContent = roleLabel;

    // Status chip
    const certStatus = user.certificate_status || 'none';
    const chip = document.getElementById('status-chip');
    if (certStatus === 'certified') {
      chip.className = 'status-chip certified'; chip.textContent = '✅ ENP Certified';
    } else if (certStatus === 'probationary') {
      chip.className = 'status-chip probationary'; chip.textContent = '🕐 Probationary';
    } else {
      chip.className = 'status-chip pending'; chip.textContent = '⏳ Pending Certification';
    }

    // Onboarding step
    const stepMap = {
      role_select:'Choose Role', profile:'Complete Profile', test:'Take Exam',
      kyc:'KYC Upload', liveness:'Face Verification', certificate:'Download Certificate',
      sc_redirect:'SC Submission', certified:'✅ Complete'
    };
    const step = user.onboarding_step || 'role_select';
    document.getElementById('stat-step').textContent = stepMap[step] || step;
    document.getElementById('stat-step-sub').textContent = step === 'certified' ? 'All steps complete' : 'In progress';

    // Cert stats
    document.getElementById('stat-cert').textContent = certStatus === 'none' ? 'Not Issued' : certStatus.charAt(0).toUpperCase() + certStatus.slice(1);
    document.getElementById('stat-cert-sub').textContent = user.certificate_id ? `ID: ${user.certificate_id.slice(-8)}` : 'Complete onboarding to receive';

    // Cert box
    if (user.certificate_id) {
      document.getElementById('cert-section').style.display = '';
      document.getElementById('cert-id-display').textContent = user.certificate_id;
      document.getElementById('cert-download-btn').href = `/api/certificate/${user.certificate_id}`;
      document.getElementById('btn-regenerate').style.display = 'inline-block';
    }

    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = '';

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = 'You are not signed in. Please sign in first.';
    document.getElementById('error').style.display = '';
    setTimeout(() => { window.location.href = '/'; }, 2500);
  }
}

function copyCertId() {
  const id = document.getElementById('cert-id-display').textContent;
  navigator.clipboard.writeText(id).then(() => {
    const btn = event.target; btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy Certificate ID'; }, 1800);
  });
}

async function regenerateCert() {
  if (!confirm('This will issue a new Certificate ID. Your old ID will stop working. Continue?')) return;
  const btn = document.getElementById('btn-regenerate');
  btn.disabled = true; btn.textContent = 'Regenerating…';
  try {
    const res = await fetch('/api/certificate/regenerate', { method: 'POST', credentials: 'include' });
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    document.getElementById('cert-id-display').textContent = data.certificate_id;
    document.getElementById('cert-download-btn').href = `/api/certificate/${data.certificate_id}`;
    btn.textContent = '✅ Done — reload to confirm';
    setTimeout(() => location.reload(), 1500);
  } catch(e) {
    btn.disabled = false; btn.textContent = '🔄 Regenerate Certificate';
    alert('Regeneration failed. Try again.');
  }
}

async function signOut() {
  try { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = '/';
}

loadDashboard();
</script>
</body>
</html>

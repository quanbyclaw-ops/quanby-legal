# nginx.conf — Quanby Legal
# Security fixes applied:
#   FIX-9: HTTP → HTTPS redirect (port 80 → 443)
#   FIX-9: HSTS, X-Frame-Options, X-Content-Type-Options, CSP headers
#   TLS termination: certificate paths must be configured per deployment

# ─── HTTP: redirect all traffic to HTTPS ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name legal.quanbyai.com 187.127.98.142;

    # Redirect every HTTP request to HTTPS permanently
    return 301 https://$host$request_uri;
}

# ─── HTTPS: main server block ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name legal.quanbyai.com;

    # ── TLS configuration (update paths to your actual cert files) ───────────
    # Recommended: use Certbot/Let's Encrypt
    #   certbot --nginx -d legal.quanbyai.com
    ssl_certificate     /etc/letsencrypt/live/legal.quanbyai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/legal.quanbyai.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/legal.quanbyai.com/chain.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Document root ──────────────────────────────────────────────────────────
    root  /var/www/quanby-legal;
    index index.html;

    client_max_body_size 20M;

    # ── FIX-9: Security headers ────────────────────────────────────────────────

    # HSTS: enforce HTTPS for 1 year, include subdomains, allow preloading
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy (restrict unnecessary browser features)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content-Security-Policy
    # Adjust script-src/style-src as needed for your frontend libraries
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://connect.facebook.net https://platform.linkedin.com;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        img-src     'self' data: https:;
        connect-src 'self' https://api.quanbyai.com https://legal.quanbyai.com;
        frame-src   'none';
        object-src  'none';
        base-uri    'self';
        form-action 'self';
        upgrade-insecure-requests;
    " always;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Do NOT cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Static frontend ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively; bust with content hash
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}

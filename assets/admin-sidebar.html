<div id="sidebar-inner">
  <!-- Logo -->
  <div id="sb-logo">
    <div id="sb-logo-img-wrap" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;overflow:hidden;background:linear-gradient(135deg,#7c3aed,#ec4899);display:flex;align-items:center;justify-content:center;">
      <img src="/qlegal-logo-sm.png" alt="QL"
        style="width:40px;height:40px;object-fit:contain;"
        onload="this.parentElement.style.background='transparent'"
        onerror="this.style.display='none'">
    </div>
    <div id="sb-logo-text">
      <span id="sb-logo-name">Quanby Legal</span>
      <span id="sb-logo-sub">Admin Portal</span>
    </div>
  </div>

  <!-- Nav -->
  <div id="sb-nav">
    <!-- MAIN -->
    <div class="sb-group">
      <div class="sb-group-label">Main</div>
      <div class="sb-item nav-item" data-page="overview" onclick="navigate('overview')">
        <i class="hgi-stroke hgi-chart-bar-line-02"></i> Overview
      </div>
      <div class="sb-item nav-item" data-page="users" onclick="navigate('users')">
        <i class="hgi-stroke hgi-user-group"></i> Users
      </div>
      <div class="sb-item nav-item" data-page="appointments" onclick="navigate('appointments')">
        <i class="hgi-stroke hgi-calendar-02"></i> Appointments
      </div>
      <div class="sb-item nav-item" data-page="registry" onclick="navigate('registry')">
        <i class="hgi-stroke hgi-book-open-01"></i> Notarial Registry
      </div>
    </div>

    <!-- MANAGEMENT -->
    <div class="sb-group">
      <div class="sb-group-label">Management</div>
      <div class="sb-item nav-item" data-page="suborgs" onclick="navigate('suborgs')">
        <i class="hgi-stroke hgi-building-03"></i> Sub-Organizations
      </div>
      <div class="sb-item nav-item" data-page="cache" onclick="navigate('cache')">
        <i class="hgi-stroke hgi-cache-add"></i> Cache
      </div>
    </div>

    <!-- SYSTEM -->
    <div class="sb-group">
      <div class="sb-group-label">System</div>
      <div class="sb-item nav-item" data-page="settings" onclick="navigate('settings')">
        <i class="hgi-stroke hgi-settings-01"></i> Settings
      </div>
    </div>
  </div>

  <!-- Footer: profile + logout -->
  <div id="sb-footer">
    <div id="sb-profile">
      <div id="sb-avatar">MA</div>
      <span id="sb-email">michael@quanbyai.com</span>
    </div>
    <button id="sb-logout" onclick="doLogout()">
      <i class="hgi-stroke hgi-logout-02"></i> Logout
    </button>
  </div>
</div>

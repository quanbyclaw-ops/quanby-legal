<div id="topbar-inner">
  <!-- Hamburger (mobile) -->
  <button id="tb-hamburger" onclick="openSidebar()">
    <i class="hgi-stroke hgi-menu-01"></i>
  </button>

  <!-- Title + breadcrumb -->
  <div id="tb-title-block">
    <div id="tb-page-title">Overview</div>
    <div id="tb-breadcrumb">Admin / <span id="tb-breadcrumb-page">Overview</span></div>
  </div>

  <!-- Controls -->
  <div id="tb-controls">
    <span id="tb-last-updated"></span>
    <button id="tb-refresh" onclick="refreshPage()">
      <i class="hgi-stroke hgi-refresh-02"></i>
      <span class="tb-refresh-label">Refresh</span>
    </button>
  </div>
</div>

<script>
(function() {
  // Sync topbar title/breadcrumb with navigate()
  // Patch the global navigate to also update topbar elements
  const _origNavigate = window.navigate;
  window._topbarPatchNavigate = function(page, label) {
    const titleEl = document.getElementById('tb-page-title');
    const bcEl = document.getElementById('tb-breadcrumb-page');
    const pageTitleEl = document.getElementById('page-title'); // legacy compat
    if (titleEl) titleEl.textContent = label || page;
    if (bcEl) bcEl.textContent = label || page;
    if (pageTitleEl) pageTitleEl.textContent = label || page;
  };

  // Sync last-updated with updateLastUpdated
  const _origUpdateLU = window.updateLastUpdated;
  window.updateLastUpdated = function() {
    const ts = 'Updated ' + new Date().toLocaleTimeString();
    const tbEl = document.getElementById('tb-last-updated');
    const legacyEl = document.getElementById('last-updated');
    if (tbEl) tbEl.textContent = ts;
    if (legacyEl) legacyEl.textContent = ts;
  };
})();
</script>
